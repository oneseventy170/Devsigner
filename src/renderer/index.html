<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none';"
    />
    <title>Devsigner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="titlebar">
      <nav class="topnav">
        <!-- Two linked dropdowns: repository → branch (breadcrumb-style) -->
        <div class="navsel" id="navsel">
          <button class="navsel-part" id="repo-btn" title="Open a repository…">
            <svg class="ico" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M216,72H131.31L104,44.69A15.86,15.86,0,0,0,92.69,40H40A16,16,0,0,0,24,56V200.62A15.4,15.4,0,0,0,39.38,216H216.89A15.13,15.13,0,0,0,232,200.89V88A16,16,0,0,0,216,72ZM40,56H92.69l16,16H40ZM216,200H40V88H216Z"/></svg>
            <span class="navsel-label" id="repo-name">Open a repository…</span>
          </button>
          <span class="navsel-sep" aria-hidden="true">/</span>
          <button class="navsel-part hidden" id="branch-btn">
            <svg class="ico" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M232,64a32,32,0,1,0-40,31v17a8,8,0,0,1-8,8H96a23.84,23.84,0,0,0-8,1.38V95a32,32,0,1,0-16,0v66a32,32,0,1,0,16,0V144a8,8,0,0,1,8-8h88a24,24,0,0,0,24-24V95A32.06,32.06,0,0,0,232,64ZM64,64A16,16,0,1,1,80,80,16,16,0,0,1,64,64ZM96,192a16,16,0,1,1-16-16A16,16,0,0,1,96,192ZM200,80a16,16,0,1,1,16-16A16,16,0,0,1,200,80Z"/></svg>
            <span class="navsel-label" id="branch-name">Working tree</span>
            <svg class="ico navsel-caret" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M181.66,170.34a8,8,0,0,1,0,11.32l-48,48a8,8,0,0,1-11.32,0l-48-48a8,8,0,0,1,11.32-11.32L128,212.69l42.34-42.35A8,8,0,0,1,181.66,170.34Zm-96-84.68L128,43.31l42.34,42.35a8,8,0,0,0,11.32-11.32l-48-48a8,8,0,0,0-11.32,0l-48,48A8,8,0,0,0,85.66,85.66Z"/></svg>
          </button>
        </div>
        <div class="nav-right">
          <!-- GitHub connection status / onboarding -->
          <button class="gh-chip" id="gh-status"></button>
          <button class="btn small" id="fetch-btn" title="Get the latest from GitHub" disabled>Fetch</button>
          <button class="btn small" id="pull-btn" title="Bring the latest into this branch" disabled>Pull</button>
        </div>
      </nav>
    </header>

    <div class="workspace">
      <!-- LEFT: one unified activity list — branches & PRs as one lifecycle,
           grouped In progress / In review / Done / Cancelled (Linear-style) -->
      <section class="list-col">
        <div class="list-head">
          <span id="list-title">Activity</span>
          <input id="list-search" class="list-search hidden" type="text" placeholder="Filter activity…" autocomplete="off" />
          <div class="list-head-actions">
            <button class="icon-btn" id="list-search-btn" title="Search activity">
              <svg class="ico" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M229.66,218.34l-50.07-50.06a88.11,88.11,0,1,0-11.31,11.31l50.06,50.07a8,8,0,0,0,11.32-11.32ZM40,112a72,72,0,1,1,72,72A72.08,72.08,0,0,1,40,112Z"/></svg>
            </button>
            <button class="icon-btn" id="list-refresh" title="Refresh">
              <svg class="ico" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M224,48V96a8,8,0,0,1-8,8H168a8,8,0,0,1,0-16h28.69L182.06,73.37a79.56,79.56,0,0,0-56.13-23.43h-.45A79.52,79.52,0,0,0,69.59,72.71,8,8,0,0,1,58.41,61.27a96,96,0,0,1,135,.79L208,76.69V48a8,8,0,0,1,16,0ZM186.41,183.29a80,80,0,0,1-112.47-.66L59.31,168H88a8,8,0,0,0,0-16H40a8,8,0,0,0-8,8v48a8,8,0,0,0,16,0V179.31l14.63,14.63A95.43,95.43,0,0,0,130,222.06h.53a95.36,95.36,0,0,0,67.07-27.33,8,8,0,0,0-11.18-11.44Z"/></svg>
            </button>
          </div>
        </div>
        <ul class="rows" id="rows">
          <li class="list-empty">Open a repository to see its activity.</li>
        </ul>
      </section>

      <!-- RIGHT: detail pane — branch activity view, PR / stash detail, or empty -->
      <section class="detail-col" id="detail-col">
        <div id="detail-view" class="hidden"></div>

        <!-- Default detail pane — filled by showEmpty(): select-repo, or the create form -->
        <div id="empty-state" class="empty-state hidden"></div>
      </section>
    </div>

    <div id="modal" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-title" id="modal-title">Name this stash</div>
        <input id="modal-input" class="input" type="text" autocomplete="off" />
        <div class="modal-actions">
          <button class="btn" id="modal-cancel">Cancel</button>
          <button class="btn primary" id="modal-ok">Save</button>
        </div>
      </div>
    </div>

    <!-- Create PR: shows the AI-generated PR preview, then opens it for real -->
    <div id="ship-modal" class="modal-overlay hidden">
      <div class="modal wide">
        <div class="modal-title">Create pull request</div>
        <div id="ship-preview" class="ship-preview"></div>
        <div class="modal-actions">
          <button class="btn" id="ship-cancel">Cancel</button>
          <button class="btn primary" id="ship-confirm" disabled>Create pull request</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="renderer.js"></script>
  </body>
</html>
