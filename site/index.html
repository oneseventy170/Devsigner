:root{
  --paper:#efebdf; --paper-2:#e7e2d3;
  --tx:#1f1d19; --tx-dim:#6f6c60; --tx-faint:#a29d8f;
  --line:rgba(27,26,24,.14); --line-2:rgba(27,26,24,.26);
  --purple:#7c4ef0; --purple-2:#8b5cf6; --purple-deep:#6a3fe0; --purple-soft:rgba(124,78,240,.14);
  --font-display:"Bricolage Grotesque",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-mono:"Space Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --font-maker:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --font-body:"Inter",-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
  --ink:#1b1a18;
  --maxw:1060px;
}
@media (prefers-color-scheme:dark){:root{--paper:#131210;--paper-2:#1b1a18;--tx:#efebdf;--tx-dim:#9a9689;--tx-faint:#6f6c61;--line:rgba(239,235,223,.12);--line-2:rgba(239,235,223,.22);--purple-soft:rgba(139,92,246,.18)}}
:root[data-theme="light"]{--paper:#efebdf;--paper-2:#e7e2d3;--tx:#1f1d19;--tx-dim:#6f6c60;--tx-faint:#a29d8f;--line:rgba(27,26,24,.14);--line-2:rgba(27,26,24,.26);--purple-soft:rgba(124,78,240,.14)}
:root[data-theme="dark"]{--paper:#131210;--paper-2:#1b1a18;--tx:#efebdf;--tx-dim:#9a9689;--tx-faint:#6f6c61;--line:rgba(239,235,223,.12);--line-2:rgba(239,235,223,.22);--purple-soft:rgba(139,92,246,.18)}

*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--paper);color:var(--tx);font-family:var(--font-display);font-weight:400;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px}
a{color:inherit;text-decoration:none}
.eyebrow{font-family:var(--font-mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--purple);font-weight:700}

/* top bar */
.top{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--paper) 86%,transparent);backdrop-filter:blur(10px)}
.top .wrap{display:flex;align-items:center;justify-content:space-between;height:58px}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;letter-spacing:-.02em}
.brand svg{width:28px;height:28px;border-radius:7px;display:block}

/* CTA — display font, never the code font */
.btn{font-family:var(--font-body);font-weight:600;font-size:14px;letter-spacing:0;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;
  background:var(--purple);color:#fff;border:1px solid var(--purple-deep);border-radius:10px;padding:9px 17px;
  transition:transform .12s ease,background .12s ease,box-shadow .12s ease;box-shadow:0 6px 18px -8px var(--purple)}
.btn:hover{background:var(--purple-2);transform:translateY(-1px);box-shadow:0 10px 26px -8px var(--purple)}
.btn:active{transform:translateY(0)}
.btn svg{width:15px;height:15px}
.btn.big{font-size:16px;padding:14px 28px}

/* hero + video */
.hero{min-height:calc(100vh - 58px);display:flex;flex-direction:column;justify-content:center;padding:40px 0 78px}
.hero .wrap{display:flex;flex-direction:column;align-items:center;text-align:center;gap:16px}
.hero h1{font-weight:800;letter-spacing:-.035em;line-height:1;margin:4px 0 0;font-size:clamp(38px,7vw,74px);max-width:14ch;text-wrap:balance}
.hero h1 em{font-style:normal;color:var(--purple)}

.player{position:relative;width:100%;max-width:920px;aspect-ratio:16/9;margin:16px 0 8px;
  border-radius:16px;overflow:hidden;border:1px solid var(--line-2);background:var(--ink);
  box-shadow:0 44px 90px -44px rgba(0,0,0,.55)}
.player::after{content:"";position:absolute;inset:-40% -12% auto;height:130%;z-index:0;pointer-events:none;
  background:radial-gradient(46% 60% at 50% 0%,rgba(239,235,223,.05),transparent 72%)}
.vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:var(--ink);z-index:1;display:block}
.poster{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;background:radial-gradient(60% 80% at 50% 45%,#26242b,var(--ink))}
.poster.hide{opacity:0;pointer-events:none}
.play{width:74px;height:74px;border-radius:50%;background:var(--purple);display:grid;place-items:center;
  box-shadow:0 14px 36px -8px var(--purple);transition:transform .15s ease}
.poster:hover .play{transform:scale(1.06)}
.play svg{width:28px;height:28px;color:#fff;margin-left:3px}
.plabel{font-family:var(--font-mono);font-size:13px;letter-spacing:.05em;color:rgba(239,235,223,.82)}
.soon{font-family:var(--font-body);font-size:13px;font-weight:600;letter-spacing:0;color:rgba(239,235,223,.82);background:rgba(239,235,223,.07);border:1px solid rgba(239,235,223,.2);border-radius:999px;padding:8px 16px}

.note{font-family:var(--font-mono);font-size:12.5px;color:var(--tx-dim);letter-spacing:.01em;margin-top:2px}
.note b{color:var(--tx)}
/* maker's mark, à la notbot.stefan.chat */
.made-by{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:30;
  display:inline-flex;align-items:center;white-space:nowrap;
  font-family:var(--font-maker);font-size:13px;font-weight:700;letter-spacing:.02em;color:var(--tx-dim);text-decoration:none}
.made-by:hover{color:var(--purple)}
.made-by .mb-caret{display:inline-block;width:7px;height:14px;background:currentColor;margin-left:5px;animation:blink 1.1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}

@media (max-width:560px){
  .wrap{padding:0 16px}
  .hero{min-height:auto;padding:30px 0 46px}
  .btn.big{width:100%}
  .player{border-radius:12px;margin:12px 0 8px}
  .play{width:62px;height:62px}
  .play svg{width:26px;height:26px}
  .made-by{position:static;transform:none;bottom:auto;display:flex;justify-content:center;margin:26px 0 10px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
:focus-visible{outline:2px solid var(--purple);outline-offset:3px;border-radius:8px}
