:root{
  --paper:#efebdf; --paper-2:#e7e2d3;
  --tx:#1f1d19; --tx-dim:#6f6c60; --tx-faint:#a29d8f;
  --line:rgba(27,26,24,.14); --line-2:rgba(27,26,24,.26);
  --purple:#7c4ef0; --purple-2:#8b5cf6; --purple-deep:#6a3fe0; --purple-soft:rgba(124,78,240,.14);
  --font-display:"Fjalla One",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-mono:"Space Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --font-maker:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --font-body:"Inter",-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
  --ink:#1b1a18;
  --maxw:1200px;
}
@media (prefers-color-scheme:dark){:root{--paper:#131210;--paper-2:#1b1a18;--tx:#efebdf;--tx-dim:#9a9689;--tx-faint:#6f6c61;--line:rgba(239,235,223,.12);--line-2:rgba(239,235,223,.22);--purple-soft:rgba(139,92,246,.18)}}
:root[data-theme="light"]{--paper:#efebdf;--paper-2:#e7e2d3;--tx:#1f1d19;--tx-dim:#6f6c60;--tx-faint:#a29d8f;--line:rgba(27,26,24,.14);--line-2:rgba(27,26,24,.26);--purple-soft:rgba(124,78,240,.14)}
:root[data-theme="dark"]{--paper:#131210;--paper-2:#1b1a18;--tx:#efebdf;--tx-dim:#9a9689;--tx-faint:#6f6c61;--line:rgba(239,235,223,.12);--line-2:rgba(239,235,223,.22);--purple-soft:rgba(139,92,246,.18)}

*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--paper);color:var(--tx);font-family:var(--font-display);font-weight:400;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 32px;width:100%}
a{color:inherit;text-decoration:none}

/* top bar — minimal wordmark */
.top{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--paper) 86%,transparent);backdrop-filter:blur(10px)}
.top .wrap{display:flex;align-items:center;height:62px}
.brand{font-weight:400;font-size:20px;letter-spacing:-.01em}

/* hero — Cursor-style: left-aligned, generous top space, big medium-weight line */
.hero{padding:clamp(26px,5vh,52px) 0 clamp(22px,3.5vh,36px)}
.hero .wrap{display:flex;flex-direction:row;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:18px 40px}
.hero h1{font-family:var(--font-display);font-weight:400;letter-spacing:-.005em;line-height:1.04;margin:0;
  font-size:clamp(28px,3.6vw,46px);max-width:16ch;text-wrap:balance;color:var(--tx)}
.hero h1 em{font-style:normal;color:var(--purple)}

/* CTAs — two pills side by side (light primary + ghost secondary) */
.cta-row{display:flex;gap:12px;flex-wrap:wrap}
.btn{font-family:var(--font-body);font-weight:600;font-size:14px;letter-spacing:0;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;
  border-radius:999px;padding:10px 18px;white-space:nowrap;
  transition:transform .12s ease,opacity .12s ease,border-color .12s ease,background .12s ease}
.btn svg{width:15px;height:15px}
.btn.primary{background:var(--purple);color:#fff;border:1px solid var(--purple-deep);box-shadow:0 8px 22px -10px var(--purple)}
.btn.primary:hover{background:var(--purple-2);transform:translateY(-1px);box-shadow:0 12px 28px -10px var(--purple)}
.btn.ghost{background:transparent;color:var(--tx);border:1px solid var(--line-2)}
.btn.ghost:hover{transform:translateY(-1px);border-color:var(--tx)}
.btn:active{transform:translateY(0)}

/* the big demo canvas — a wide subtle panel holding the walkthrough */
.stage{width:100%;padding:clamp(16px,2.6vh,28px) 0 56px}
.player{position:relative;width:100%;margin:0;aspect-ratio:16/9;
  border-radius:14px;overflow:hidden;background:var(--ink)}
.vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:var(--ink);z-index:1;display:block}
.poster{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(60% 80% at 50% 45%,#26242b,var(--ink))}
.soon{font-family:var(--font-body);font-size:13px;font-weight:600;letter-spacing:0;
  color:rgba(239,235,223,.82);background:rgba(239,235,223,.07);border:1px solid rgba(239,235,223,.2);
  border-radius:999px;padding:8px 16px}

/* maker's mark, à la notbot.stefan.chat */
.made-by{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:30;
  display:inline-flex;align-items:center;white-space:nowrap;
  font-family:var(--font-maker);font-size:13px;font-weight:700;letter-spacing:.02em;color:var(--tx-dim);text-decoration:none}
.made-by:hover{color:var(--purple)}
.made-by .mb-caret{display:inline-block;width:7px;height:14px;background:currentColor;margin-left:5px;animation:blink 1.1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}

@media (max-width:640px){
  .wrap{padding:0 20px}
  .hero{padding:44px 0 40px}
  .hero h1{font-size:clamp(30px,8.5vw,40px);max-width:20ch}
  .cta-row{width:100%}
  .btn{flex:1 1 auto}
  .made-by{position:static;transform:none;bottom:auto;display:flex;justify-content:center;margin:28px 0 12px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
:focus-visible{outline:2px solid var(--purple);outline-offset:3px;border-radius:10px}
</style></head><body>
